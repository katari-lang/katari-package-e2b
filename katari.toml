[package]
name = "e2b"
version = "0.1.1"
description = "Run Python in a persistent e2b sandbox as a Katari tool. Ships an FFI sidecar (e2b.ts)."

[runtime]
url = "http://localhost:3000"

# The sidecar's source root defaults to [package].src ("src"), where e2b.ts lives alongside e2b.ktr,
# so no explicit [sidecar] section is needed — `katari apply` bundles it into the consumer's snapshot.

[dependencies]
registry = "https://raw.githubusercontent.com/katari-lang/katari-registry/main"
snapshot = "staging"
packages = []
